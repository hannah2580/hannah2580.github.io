<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF9F6;
    --ink: #1a1a18;
    --muted: #7a7870;
    --accent: #b5855a;
    --border: #e8e5df;
    --serif: 'Lora', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.7;
    max-width: 680px;
    margin: 0 auto;
    padding: 4rem 2rem 6rem;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .nav-name {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.01em;
    text-decoration: none;
    color: var(--ink);
  }
  .nav-links {
    display: flex;
    gap: 1.5rem;
    list-style: none;
  }
  .nav-links a {
    font-size: 0.85rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a.active { color: var(--ink); border-bottom: 1px solid var(--ink); }

  .page-header { margin-bottom: 3rem; }
  .page-header h1 {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 400;
    margin-bottom: 0.5rem;
  }
  .page-header p {
    font-size: 0.95rem;
    color: var(--muted);
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

.creative-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}
.creative-card {
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.2s;
}
.creative-card:hover { border-color: var(--accent); }
.creative-thumb {
  width: 100%;
  aspect-ratio: 4/3;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--border);
  font-size: 2rem;
}
.creative-meta { padding: 0.75rem 1rem; }
.creative-title {
  font-size: 0.9rem;
  font-family: var(--serif);
  margin-bottom: 0.2rem;
}
.creative-sub { font-size: 0.78rem; color: var(--muted); }
